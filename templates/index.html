<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IPL 2026 Playoff Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <main class="page-shell">
      <section class="topbar">
        <div class="topbar-title">
          <h1>IPL 2026 Playoff Tracker</h1>
        </div>
        <div class="topbar-actions">
          <label class="simulation-control" for="simulation-count">
            <span>Simulations</span>
            <input id="simulation-count" type="number" min="1" value="{{ default_simulations }}">
            <small>max {{ max_simulations }}</small>
          </label>
          <button id="simulate-button" class="button button-primary">Run Simulation</button>
        </div>
      </section>

      <section class="layout-grid">
        <article class="panel standings-panel">
          <div class="panel-header">
            <div>
              <h2>Standings</h2>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Team</th>
                  <th>Pld</th>
                  <th>W</th>
                  <th>L</th>
                  <th>Pts</th>
                  <th>Chance</th>
                </tr>
              </thead>
              <tbody id="standings-body"></tbody>
            </table>
          </div>
        </article>

        <article class="panel controls-panel">
          <div class="panel-header">
            <div>
              <h2>Remaining Matches</h2>
            </div>
          </div>
          <div id="matches-list" class="matches-list"></div>
        </article>
      </section>
    </main>

    <script>
      window.APP_CONFIG = {
        defaultSimulations: {{ default_simulations|tojson }},
        maxSimulations: {{ max_simulations|tojson }}
      };
    </script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
  </html>
